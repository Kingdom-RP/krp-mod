# Автопубликация модпака Kingdom RP на GitHub Pages.
#
# По пушу в main (или тегу vX.Y.Z): собирает мод, прогоняет сборщик дистрибутива
# из krp-launcher и деплоит готовый dist/ на GitHub Pages.
# Лаунчер тянет файлы с https://<логин>.github.io/krp-mod (= MANIFEST_BASE_URL).
#
# ОДНОРАЗОВАЯ НАСТРОЙКА:
#   1. Репозитории Kingdom-RP/krp-mod и Kingdom-RP/krp-launcher на GitHub.
#   2. Settings → Pages → Source = "GitHub Actions" (в репо krp-mod).
#   3. Если krp-launcher ПРИВАТНЫЙ — создать секрет LAUNCHER_PAT (PAT с доступом
#      на чтение репо) и раскомментировать строку token ниже.

name: Publish modpack

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
  # Пересборка по событию из krp-modpack (новый/обновлённый Release с модами).
  # Шлёт его workflow notify.yml в krp-modpack через repository_dispatch.
  repository_dispatch:
    types: [modpack-updated]

permissions:
  contents: read
  pages: write
  id-token: write

# Один деплой Pages за раз. НЕ отменяем текущий (cancel-in-progress: false) —
# иначе обрыв деплоя на полпути оставляет environment github-pages с подвисшим
# queued-деплоем, и следующий прогон надолго застревает в "deployment_queued".
# Параллельные прогоны просто ждут завершения текущего (рекоменд. GitHub для Pages).
concurrency:
  group: pages
  cancel-in-progress: false

env:
  # Адрес Pages организации Kingdom-RP (поддомен — имя владельца, в нижнем регистре).
  BASE_URL: https://kingdom-rp.github.io/krp-mod
  # Источник сторонних модов: Release этого репо krp-modpack.
  MODS_REPO: Kingdom-RP/krp-modpack
  MODS_TAG: v1
  # Версия NeoForge — входит в ключ кэша build-work (installer-вывод + JRE).
  NEO_VERSION: 21.1.233

jobs:
  build:
    runs-on: windows-latest # windows — чтобы нативы совпадали с целевой ОС
    steps:
      - name: Checkout krp-mod
        uses: actions/checkout@v5
        with:
          path: krp-mod

      - name: Checkout krp-launcher (сборщик)
        uses: actions/checkout@v5
        with:
          repository: Kingdom-RP/krp-launcher
          path: krp-launcher
          # token: ${{ secrets.LAUNCHER_PAT }}   # раскомментировать, если krp-launcher приватный

      - name: Checkout krp-modpack (sides.toml — стороны модов)
        uses: actions/checkout@v5
        with:
          repository: Kingdom-RP/krp-modpack
          path: krp-modpack

      - name: Setup JDK 21 (Temurin)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Кэш Gradle: на mods-only прогонах код мода не меняется → инкрементальная
      # сборка (секунды вместо минут). Ключ по gradle-файлам; промах = полная сборка.
      - name: Cache Gradle
        uses: actions/cache@v6
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('krp-mod/**/*.gradle', 'krp-mod/**/*.gradle.kts', 'krp-mod/gradle.properties', 'krp-mod/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      # Кэш Rust-сборки сборщика (cargo registry + target). Ключ по Cargo.lock.
      - name: Cache Rust builder
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: krp-launcher/builder

      # Кэш вывода NeoForge-установщика (libraries/ + version JSON) и архивов JRE.
      # Пока NEO_VERSION и JRE те же — installer и скачивание JRE пропускаются.
      # cache-hit → передаём сборщику --skip-install (см. шаг Build dist).
      - name: Cache NeoForge work + JRE
        id: workcache
        uses: actions/cache@v6
        with:
          path: krp-launcher/build-work
          key: neowork-${{ runner.os }}-neo${{ env.NEO_VERSION }}-jre21

      - name: Setup Pages (авто-включение источника = GitHub Actions)
        uses: actions/configure-pages@v6
        with:
          enablement: true

      - name: Build mod
        shell: bash
        working-directory: krp-mod
        run: ./gradlew build --no-daemon

      - name: Locate mod jar
        id: jar
        shell: pwsh
        run: |
          $jar = Get-ChildItem krp-mod/build/libs -Filter *.jar |
            Where-Object { $_.Name -notmatch 'sources|javadoc' } |
            Select-Object -First 1
          "path=$($jar.FullName)" >> $env:GITHUB_OUTPUT

      - name: Build dist (NeoForge + mod + JRE + сторонние моды + manifest)
        shell: bash
        working-directory: krp-launcher
        env:
          # Токен для GitHub API сборщика (список ассетов Release krp-modpack) —
          # снимает лимит анонимных запросов.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Секретный ключ minisign для подписи manifest.json (содержимое .key-файла).
          # Если секрет не задан — сборщик просто не подпишет манифест (лаунчер тогда
          # тоже не требует подпись). См. docs/manifest-signing.md в krp-launcher.
          KRP_MANIFEST_SECRET_KEY: ${{ secrets.KRP_MANIFEST_SECRET_KEY }}
          KRP_MANIFEST_SECRET_KEY_PASSWORD: ${{ secrets.KRP_MANIFEST_SECRET_KEY_PASSWORD }}
        run: |
          # При попадании в кэш build-work (installer-вывод + JRE уже есть)
          # пропускаем установку NeoForge; при промахе — полная установка.
          SKIP_INSTALL=""
          if [ "${{ steps.workcache.outputs.cache-hit }}" = "true" ]; then
            SKIP_INSTALL="--skip-install"
            echo "build-work из кэша → --skip-install"
          fi
          # Шейдерпаки: все .zip из krp-mod/shaderpacks/ → повторяемый --shaderpack.
          SHADER_ARGS=()
          for zip in "${{ github.workspace }}/krp-mod/shaderpacks/"*.zip; do
            [ -e "$zip" ] || continue
            SHADER_ARGS+=(--shaderpack "$zip")
            echo "шейдерпак → $(basename "$zip")"
          done
          cargo run --manifest-path builder/Cargo.toml --release -- \
            --base-url "$BASE_URL" \
            --mod-jar "${{ steps.jar.outputs.path }}" \
            --neoforge "$NEO_VERSION" \
            --mods-release "$MODS_REPO" \
            --mods-tag "$MODS_TAG" \
            --sides "${{ github.workspace }}/krp-modpack/sides.toml" \
            --config-dir "${{ github.workspace }}/krp-modpack/config" \
            --config-sides "${{ github.workspace }}/krp-modpack/config-sides.toml" \
            --version "1.0.${{ github.run_number }}" \
            --out "${{ github.workspace }}/dist" \
            "${SHADER_ARGS[@]}" \
            $SKIP_INSTALL

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ${{ github.workspace }}/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
