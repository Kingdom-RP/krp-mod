modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''
logoFile="logo.png"

# Микстины на 1.21 подключаются нативно — без манифест-костыля 1.20.1.
[[mixins]]
config="${mod_id}.mixins.json"

# Опциональная совместимость с Farmer's Delight (применяется только если мод
# загружен — см. FDMixinPlugin). Без FD мизины не применяются и не падают.
[[mixins]]
config="${mod_id}.farmersdelight.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"
