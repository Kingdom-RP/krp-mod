modLoader="javafml"
loaderVersion="${loader_version_range}"
license="${mod_license}"

[[mods]]
modId="${mod_id}"
version="${mod_version}"
displayName="${mod_name}"
authors="${mod_authors}"
description='''${mod_description}'''
logoFile="logo.png"

# Микстины на 1.21 подключаются нативно — без манифест-костыля 1.20.1.
[[mixins]]
config="${mod_id}.mixins.json"

# Опциональная совместимость с Farmer's Delight (применяется только если мод
# загружен — см. FDMixinPlugin). Без FD мизины не применяются и не падают.
[[mixins]]
config="${mod_id}.farmersdelight.mixins.json"

# Опциональная совместимость с Tide (рыбалка) — применяется только если мод
# загружен (см. TideMixinPlugin). Ускоренный клёв Рыбака под TideFishingHook.
[[mixins]]
config="${mod_id}.tide.mixins.json"

# Опциональная совместимость с Dynamic Trees — только если мод загружен
# (см. DTMixinPlugin). XP Лесоруба по объёму сваленного DT-дерева.
[[mixins]]
config="${mod_id}.dynamictrees.mixins.json"

# Опциональная совместимость с AlcoCraft+ — только если мод загружен
# (см. AlcoCraftMixinPlugin). Гейт/XP Повара за варку пива в Кеге.
[[mixins]]
config="${mod_id}.alcocraft.mixins.json"

# Опциональный EMI-твик (клиент) — только если EMI загружен (см. EmiMixinPlugin).
# «Distraction-free»: скрывать индекс-панель EMI при пустом поиске.
[[mixins]]
config="${mod_id}.emi.mixins.json"

# Гейт рефоржа Tiered More по уровню Мастерового (soft — только если мод загружен).
[[mixins]]
config="${mod_id}.tieredmore.mixins.json"

# Фикс мода Backpacks — только если мод загружен (см. BackpacksMixinPlugin).
# Защита открытого рюкзака от перемещения хоткеем (SWAP) в собственный слот.
[[mixins]]
config="${mod_id}.backpacks.mixins.json"

[[dependencies.${mod_id}]]
    modId="neoforge"
    type="required"
    versionRange="[${neo_version},)"
    ordering="NONE"
    side="BOTH"

[[dependencies.${mod_id}]]
    modId="minecraft"
    type="required"
    versionRange="${minecraft_version_range}"
    ordering="NONE"
    side="BOTH"

# Optional + ordering=AFTER: наш датапак грузится ПОСЛЕ Tide, поэтому оверрайды
# рецептов (data/tide/recipe/*) перекрывают оригиналы — отключение OP-предметов
# (enchanted_pocket_watch / starlight_bow / dragonfin_boots).
[[dependencies.${mod_id}]]
    modId="tide"
    type="optional"
    versionRange="*"
    ordering="AFTER"
    side="BOTH"

# Optional + ordering=AFTER: оверрайды рецептов Small Ships (data/smallships/recipe/*)
# перекрывают оригиналы — отключение крафта cannon / cannon_ball.
[[dependencies.${mod_id}]]
    modId="smallships"
    type="optional"
    versionRange="*"
    ordering="AFTER"
    side="BOTH"

# Optional + ordering=AFTER: оверрайды записей sea_message Hybrid Aquatic
# (data/hybrid-aquatic/hybrid-aquatic/sea_message/*) перекрывают оригиналы —
# river_to_sea / free_gaza / free_palestine переводятся на безобидный текст.
[[dependencies.${mod_id}]]
    modId="hybrid_aquatic"
    type="optional"
    versionRange="*"
    ordering="AFTER"
    side="BOTH"
